<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SAHIBA Chain Store CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#06090F;--bg2:#0C1220;--bg3:#121B2E;--bg4:#182440;--bg5:#1E2D4D;
--bdr:#1C2A45;--bdr2:#253555;
--t1:#F0F2F8;--t2:#A0AABE;--t3:#6B7A94;--t4:#4A5A74;
--ac:#4F8EF7;--ac2:#6BA1FF;--acd:rgba(79,142,247,.1);
--gn:#22C55E;--gnd:rgba(34,197,94,.1);
--yw:#EAB308;--ywd:rgba(234,179,8,.1);
--rd:#EF4444;--rdd:rgba(239,68,68,.1);
--pk:#EC4899;--pkd:rgba(236,72,153,.1);
--cy:#06B6D4;--cyd:rgba(6,182,212,.1);
--or:#F97316;--ord:rgba(249,115,22,.1);
--r1:8px;--r2:12px;--r3:16px;--r4:20px;
--sh:0 4px 16px rgba(0,0,0,.4);
}
body{font-family:"DM Sans",system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
input,select,textarea,button{font-family:inherit}
a{color:var(--ac);text-decoration:none}

.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,#0F1A30 0%,var(--bg) 70%)}
.lb{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r4);padding:44px 36px;width:360px;max-width:92vw;text-align:center;box-shadow:var(--sh)}
.ll{font-family:"Instrument Serif",serif;font-size:36px;color:var(--ac);letter-spacing:1px;margin-bottom:2px}
.ls{font-size:11px;color:var(--t4);text-transform:uppercase;letter-spacing:3px;margin-bottom:32px}
.pd{display:flex;justify-content:center;gap:14px;margin-bottom:28px}
.pdd{width:13px;height:13px;border-radius:50%;border:2px solid var(--bdr);transition:.2s}
.pdd.f{background:var(--ac);border-color:var(--ac);box-shadow:0 0 10px rgba(79,142,247,.4)}
.pdd.e{border-color:var(--rd);background:var(--rd)}
.pp{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.ppb{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--t1);font-size:20px;font-weight:600;padding:14px;cursor:pointer;transition:.15s;font-family:inherit}
.ppb:hover{background:var(--bg4);border-color:var(--ac)}
.ppb:active{transform:scale(.95)}
.ppb.c{font-size:12px;font-weight:500;color:var(--t3)}
.lu{font-size:13px;color:var(--t2);margin-bottom:20px}
.lu select{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r1);color:var(--t1);padding:6px 10px;font-size:13px;margin-left:6px;cursor:pointer;font-family:inherit}
.le{color:var(--rd);font-size:12px;margin-top:14px;min-height:18px}

.al{display:flex;min-height:100vh}
.sb{width:220px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s}
.sb-h{padding:20px 16px;border-bottom:1px solid var(--bdr)}
.sb-h h1{font-family:"Instrument Serif",serif;font-size:24px;color:var(--ac);font-weight:400}
.sb-h p{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:2.5px;margin-top:1px}
.sb-n{flex:1;padding:12px 8px;overflow-y:auto}
.ns{margin-bottom:16px}
.nl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--t4);padding:0 8px;margin-bottom:6px;font-weight:600}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r1);cursor:pointer;color:var(--t3);font-size:13px;font-weight:500;transition:.15s;margin-bottom:1px;position:relative}
.ni:hover{background:var(--bg3);color:var(--t1)}
.ni.a{background:var(--acd);color:var(--ac)}
.ni .ic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ni .nb{position:absolute;right:8px;background:var(--rd);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700}
.sb-f{padding:12px;border-top:1px solid var(--bdr)}
.up{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r1);cursor:pointer}
.up:hover{background:var(--bg3)}
.ua{width:28px;height:28px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.ui .un{font-size:12px;font-weight:600;color:var(--t1)}
.ui .ur{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:1px}

.mc{margin-left:220px;flex:1;min-height:100vh}
.tb{height:52px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.tb-t{font-size:16px;font-weight:600}
.tb-a{display:flex;align-items:center;gap:10px}
.tb-s{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r1);padding:7px 12px;color:var(--t1);font-size:12px;width:200px;outline:none;font-family:inherit}
.tb-s:focus{border-color:var(--ac)}
.hb{display:none;background:none;border:none;color:var(--t1);font-size:22px;cursor:pointer;padding:4px}
.lang-sw{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r1);padding:5px 8px;color:var(--t2);font-size:11px;cursor:pointer;font-family:inherit;font-weight:600}

.pc{padding:24px}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.mk{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:18px;transition:.2s;position:relative;overflow:hidden}
.mk:hover{border-color:var(--ac);transform:translateY(-1px)}
.mk-l{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.mk-v{font-size:26px;font-weight:700;font-family:"Instrument Serif",serif}
.mk-c{font-size:11px;margin-top:4px}
.tw{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden}
.dt{width:100%;border-collapse:collapse}
.dt th{background:var(--bg2);padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--t4);font-weight:600;border-bottom:1px solid var(--bdr);white-space:nowrap}
.dt td{padding:10px 14px;font-size:12px;border-bottom:1px solid var(--bdr);color:var(--t2)}
.dt tr:hover td{background:var(--bg4);color:var(--t1)}
.dt tr:last-child td{border-bottom:none}
.bd{display:inline-flex;align-items:center;padding:3px 9px;border-radius:16px;font-size:10px;font-weight:600;letter-spacing:.3px}
.bd-gn{background:var(--gnd);color:var(--gn)}.bd-yw{background:var(--ywd);color:var(--yw)}.bd-rd{background:var(--rdd);color:var(--rd)}
.bd-bl{background:var(--acd);color:var(--ac)}.bd-pk{background:var(--pkd);color:var(--pk)}.bd-cy{background:var(--cyd);color:var(--cy)}
.bd-or{background:var(--ord);color:var(--or)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r1);font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.15s;font-family:inherit}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:var(--ac2)}
.btn-g{background:transparent;color:var(--t2);border-color:var(--bdr)}.btn-g:hover{background:var(--bg3);color:var(--t1);border-color:var(--t3)}
.btn-s{padding:5px 10px;font-size:11px}
.btn-d{background:var(--rd);color:#fff}
.btn-gn{background:var(--gn);color:#fff}

.pl{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px}
.pl-c{min-width:240px;max-width:260px;flex-shrink:0}
.pl-h{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2) var(--r2) 0 0}
.pl-h h3{font-size:12px;font-weight:600}
.pl-cnt{background:var(--bg2);padding:2px 7px;border-radius:10px;font-size:10px;color:var(--t3)}
.pl-b{background:var(--bg2);border:1px solid var(--bdr);border-top:none;border-radius:0 0 var(--r2) var(--r2);padding:6px;min-height:80px;display:flex;flex-direction:column;gap:6px}
.pl-k{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r1);padding:10px;cursor:pointer;transition:.15s}
.pl-k:hover{border-color:var(--ac);transform:translateY(-1px)}
.pl-k .kc{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--t4);margin-bottom:3px}
.pl-k .kt{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:5px}
.pl-k .km{display:flex;justify-content:space-between;align-items:center}
.pl-k .ka{font-size:12px;font-weight:700;color:var(--gn)}
.pl-k .kd{font-size:10px;color:var(--t4)}
.pl-k .kp{font-size:10px;color:var(--ac);margin-top:4px}

.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}
.pkd{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:.2s}
.pkd:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:var(--sh)}
.pi{height:180px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden}
.pi img{width:100%;height:100%;object-fit:cover}
.pi .pi-ph{color:var(--t4);font-size:11px;text-transform:uppercase;letter-spacing:1px}
.pi .sb-k{position:absolute;top:6px;right:6px}
.pif{padding:12px}
.pif .sn{font-size:10px;color:var(--ac);text-transform:uppercase;letter-spacing:1px}
.pif .pn{font-size:13px;font-weight:600;margin:3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pif .pp2{font-size:14px;font-weight:700;color:var(--gn)}
.pif .pcat{font-size:10px;color:var(--t4);margin-top:3px}

.acs{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.akd{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:18px;cursor:pointer;transition:.2s}
.akd:hover{border-color:var(--ac);box-shadow:var(--sh)}
.akd .ah{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}
.akd .acn{font-family:"Instrument Serif",serif;font-size:20px;font-weight:400}
.akd .aby{font-size:12px;color:var(--t2);margin-top:2px}
.akd .ast{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)}
.akd .asl{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1px}
.akd .asv{font-size:14px;font-weight:700;margin-top:1px}

.do{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;justify-content:flex-end;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.dp{width:520px;max-width:95vw;background:var(--bg2);border-left:1px solid var(--bdr);height:100vh;overflow-y:auto;padding:24px;animation:slideR .25s ease}
@keyframes slideR{from{transform:translateX(100%)}to{transform:translateX(0)}}
.dp-x{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;float:right;padding:4px}
.dp-x:hover{color:var(--t1)}
.dp h2{font-family:"Instrument Serif",serif;font-size:22px;font-weight:400;margin-bottom:3px}
.dp .ds{font-size:12px;color:var(--t4);margin-bottom:18px}
.dps{margin-bottom:18px}
.dps h3{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t4);margin-bottom:8px;font-weight:600}
.df{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.df .dl{color:var(--t3)}.df .dv{color:var(--t1);font-weight:500}
.tl{position:relative;padding-left:18px}
.tl::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:1.5px;background:var(--bdr)}
.ti{position:relative;margin-bottom:14px;padding-left:14px}
.ti::before{content:"";position:absolute;left:-16px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--ac);border:2px solid var(--bg2)}
.ti .td2{font-size:10px;color:var(--t4)}.ti .tt{font-size:12px;color:var(--t2);margin-top:1px}
.fb{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.fs{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r1);padding:7px 10px;color:var(--t1);font-size:12px;cursor:pointer;font-family:inherit}
.fs:focus{border-color:var(--ac);outline:none}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bdr);margin-bottom:18px}
.tab{padding:8px 16px;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--t1)}.tab.a{color:var(--ac);border-bottom-color:var(--ac)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s}
.modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r3);width:520px;max-width:92vw;max-height:85vh;overflow-y:auto;padding:28px;box-shadow:var(--sh)}
.modal h2{font-family:"Instrument Serif",serif;font-size:22px;font-weight:400;margin-bottom:16px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:4px;font-weight:600}
.fi{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r1);padding:8px 12px;color:var(--t1);font-size:13px;font-family:inherit}
.fi:focus{border-color:var(--ac);outline:none}
textarea.fi{min-height:70px;resize:vertical}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.set-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.set-card h3{font-size:14px;font-weight:600;margin-bottom:10px}
.toggle{width:36px;height:20px;background:var(--bdr);border-radius:10px;position:relative;cursor:pointer;transition:.2s}
.toggle.on{background:var(--ac)}
.toggle::after{content:"";position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s}
.toggle.on::after{left:18px}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr)}
.set-row:last-child{border-bottom:none}
.set-row .sr-l{font-size:13px;color:var(--t2)}
.empty{text-align:center;padding:40px 20px;color:var(--t4)}
.empty .em-i{font-size:40px;margin-bottom:12px}
.empty .em-t{font-size:14px;color:var(--t2);margin-bottom:4px}
.empty .em-s{font-size:12px}
.log-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.log-item:last-child{border-bottom:none}
.log-time{color:var(--t4);white-space:nowrap;min-width:110px}
.log-user{color:var(--ac);font-weight:600;min-width:60px}
.log-action{color:var(--t2)}
.chart-ph{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:160px;padding:0 16px}
.bar{width:40px;border-radius:4px 4px 0 0;transition:height .5s;position:relative}
.bar-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--t4);white-space:nowrap}
.bar-val{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--t2);font-weight:600}

/* Loading */
.ld-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px}
.ld-spin{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{margin-top:12px;font-size:13px;color:var(--t3)}
.api-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3)}
.api-dot{width:6px;height:6px;border-radius:50%}
.api-dot.on{background:var(--gn)}.api-dot.off{background:var(--rd)}.api-dot.loading{background:var(--yw);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Product detail image */
.dp-img{width:100%;height:220px;background:var(--bg3);border-radius:var(--r2);overflow:hidden;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.dp-img img{width:100%;height:100%;object-fit:contain}
.dp-img .pi-ph{color:var(--t4);font-size:13px}

@media(max-width:768px){
.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}.mc{margin-left:0}.hb{display:block}
.mg{grid-template-columns:repeat(2,1fr)}.acs{grid-template-columns:1fr}.pg{grid-template-columns:repeat(2,1fr)}
.tb-s{width:120px}.pl{flex-direction:column}.pl-c{min-width:100%;max-width:100%}
.fg-row{grid-template-columns:1fr}
}
@media(max-width:480px){.mg{grid-template-columns:1fr}.pg{grid-template-columns:1fr}}

/* Quote/Order builder */
.qb-wrap{display:grid;grid-template-columns:340px 1fr;gap:20px;min-height:500px}
.qb-sidebar{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:16px;overflow-y:auto;max-height:75vh}
.qb-main{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:20px;overflow-y:auto;max-height:75vh}
.qb-search{position:relative}
.qb-results{max-height:300px;overflow-y:auto;margin-top:8px}
.qb-prod{display:flex;gap:10px;padding:8px;border:1px solid var(--bdr);border-radius:var(--r1);margin-bottom:6px;cursor:pointer;transition:.15s;align-items:center}
.qb-prod:hover{border-color:var(--ac);background:var(--bg4)}
.qb-prod img{width:44px;height:44px;border-radius:6px;object-fit:cover}
.qb-prod .qp-ph{width:44px;height:44px;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t4)}
.qb-prod .qp-info{flex:1;min-width:0}
.qb-prod .qp-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qb-prod .qp-meta{font-size:10px;color:var(--t3);margin-top:2px}
.qb-prod .qp-stock{font-size:10px;margin-top:2px}
.qb-prod .qp-add{background:var(--ac);color:#fff;border:none;border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;white-space:nowrap}

/* Line items table */
.li-table{width:100%;border-collapse:collapse;margin-top:12px}
.li-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--t4);padding:6px 8px;border-bottom:1px solid var(--bdr);font-weight:600}
.li-table td{padding:8px;border-bottom:1px solid var(--bdr);font-size:12px;vertical-align:middle}
.li-table tr:last-child td{border-bottom:none}
.li-table .li-img{width:36px;height:36px;border-radius:4px;object-fit:cover}
.li-table input[type=number]{width:70px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r1);padding:4px 6px;color:var(--t1);font-size:12px;text-align:right;font-family:inherit}
.li-table input[type=number]:focus{border-color:var(--ac);outline:none}
.li-rm{background:none;border:none;color:var(--rd);cursor:pointer;font-size:16px;padding:2px 6px}
.li-rm:hover{color:#fff;background:var(--rd);border-radius:4px}

/* Totals */

<!-- Google Drive Image Loader - runs before React -->
<script>
var GDRIVE_IMG_MAP = {};
var GDRIVE_LOADED = false;
var GDRIVE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxetLjQ0z9uWLoOxevDn7cvOraKEY81i7L-TfrS9A7hy140SdlAY1ikWvKrI6U49wMk/exec";

function loadDriveImages() {
  // Check cache first
  try {
    var cached = sessionStorage.getItem("gdrive_cache");
    var cacheTime = sessionStorage.getItem("gdrive_cache_time");
    if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < 86400000) {
      var files = JSON.parse(cached);
      files.forEach(function(f) {
        var name = f.name.replace(/\.(jpg|jpeg|png|webp)$/i, "");
        var url = "https://lh3.googleusercontent.com/d/" + f.id + "=w400";
        GDRIVE_IMG_MAP[name] = url;
        GDRIVE_IMG_MAP[name.toUpperCase()] = url;
      });
      GDRIVE_LOADED = true;
      console.log("GDrive images loaded from cache: " + files.length + " files");
      return;
    }
  } catch(e) {}

  fetch(GDRIVE_SCRIPT_URL).then(function(r) { return r.json(); }).then(function(data) {
    if (data && data.files) {
      data.files.forEach(function(f) {
        var name = f.name.replace(/\.(jpg|jpeg|png|webp)$/i, "");
        var url = "https://lh3.googleusercontent.com/d/" + f.id + "=w400";
        GDRIVE_IMG_MAP[name] = url;
        GDRIVE_IMG_MAP[name.toUpperCase()] = url;
      });
      GDRIVE_LOADED = true;
      console.log("GDrive images loaded: " + data.files.length + " files");
      try { sessionStorage.setItem("gdrive_cache", JSON.stringify(data.files)); sessionStorage.setItem("gdrive_cache_time", String(Date.now())); } catch(e) {}
      // trigger re-render
      if (window.__refreshApp) window.__refreshApp();
    }
  }).catch(function(e) { console.log("GDrive load failed: " + e); });
}
loadDriveImages();

function getStyleImg(art) {
  if (!art) return null;
  var code = String(art).toUpperCase();
  // Try exact match first
  if (GDRIVE_IMG_MAP[code]) return GDRIVE_IMG_MAP[code];
  // Try stripping trailing letters (517VE -> 517)
  var numOnly = code.replace(/[A-Z]+$/, "");
  if (GDRIVE_IMG_MAP[numOnly]) return GDRIVE_IMG_MAP[numOnly];
  // Try partial match - find first key that starts with the code
  var keys = Object.keys(GDRIVE_IMG_MAP);
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].toUpperCase().indexOf(code) === 0 || code.indexOf(keys[i].toUpperCase()) === 0) return GDRIVE_IMG_MAP[keys[i]];
  }
  return null;
}
</script>

<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;

// ====== SQL API LAYER ======
const API_BASE = "/api/query"; // Netlify proxy path
const DIRECT_API = "https://aggrievedly-spryest-hattie.ngrok-free.dev/V1/query";
const API_TOKEN = "Sahiba_CZSfEghwaD4s";

async function sqlQuery(query) {
  // Try Netlify proxy first, fallback to direct ngrok
  var endpoints = [API_BASE, DIRECT_API];
  for (var ep of endpoints) {
    try {
      var res = await fetch(ep, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + API_TOKEN,
          "ngrok-skip-browser-warning": "true"
        },
        body: JSON.stringify({ query: query })
      });
      if (res.ok) {
        var data = await res.json();
        if (data.status === "success" || data.data) return data.data || [];
      }
    } catch(e) { continue; }
  }
  return null; // both failed
}

// Pre-built queries from config
const QUERIES = {
  allInventory: "SELECT LEFT(Articulo, CHARINDEX('-', Articulo + '-') - 1) AS Articulo, SUM(EXISTENCIA) AS Stock FROM (SELECT Articulo, EXISTENCIA FROM PRODS_C UNION ALL SELECT Articulo, EXISTENCIA FROM PRODS_L UNION ALL SELECT Articulo, EXISTENCIA FROM PRODS_CHIN UNION ALL SELECT Articulo, EXISTENCIA FROM PRODS_LECU UNION ALL SELECT Articulo, EXISTENCIA FROM SAP_CC) AS A GROUP BY LEFT(Articulo, CHARINDEX('-', Articulo + '-') - 1)",
  bodegaWithCost: "SELECT LEFT(Articulo, CHARINDEX('-', Articulo + '-') - 1) AS Articulo, ROUND(MAX(Costo),0) AS Costo, SUM(EXISTENCIA) AS Bodega_Stock FROM SAP_CC GROUP BY LEFT(Articulo, CHARINDEX('-', Articulo + '-') - 1)",
  descriptions: "SELECT LEFT(Articulo, CHARINDEX('-', Articulo + '-') - 1) AS Articulo, MAX(Descripcion) AS Descripcion, MAX(Linea) AS Linea, ROUND(MAX(Precio_Venta),0) AS Precio_Venta FROM MOVS_LEONA GROUP BY LEFT(Articulo, CHARINDEX('-', Articulo + '-') - 1)",
  storeStock: function(table) { return "SELECT LEFT(Articulo, CHARINDEX('-', Articulo + '-') - 1) AS Articulo, SUM(EXISTENCIA) AS Stock FROM " + table + " GROUP BY LEFT(Articulo, CHARINDEX('-', Articulo + '-') - 1)"; }
};

const STORE_TABLES = [
  {code:"TS0005",name:"Bodega",table:"SAP_CC",key:"bodega"},
  {code:"TS0001",name:"Leona Vicario",table:"PRODS_L",key:"leona"},
  {code:"TS0002",name:"Cercunvalacion",table:"PRODS_C",key:"cercu"},
  {code:"TS0003",name:"Lecumberri",table:"PRODS_LECU",key:"lecum"},
  {code:"TS0004",name:"Chiconcuac",table:"PRODS_CHIN",key:"chinco"}
];

// ====== DATA HOOK ======
function useProducts() {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [apiStatus, setApiStatus] = useState("loading"); // loading, connected, offline
  const [imgReady, setImgReady] = useState(GDRIVE_LOADED);

  useEffect(() => {
    var cancelled = false;
    async function load() {
      try {
        // Parallel fetch: descriptions, bodega stock, all inventory, per-store
        var [descs, bodega, allInv, leonaS, cercuS, lecumS, chincoS] = await Promise.all([
          sqlQuery(QUERIES.descriptions),
          sqlQuery(QUERIES.bodegaWithCost),
          sqlQuery(QUERIES.allInventory),
          sqlQuery(QUERIES.storeStock("PRODS_L")),
          sqlQuery(QUERIES.storeStock("PRODS_C")),
          sqlQuery(QUERIES.storeStock("PRODS_LECU")),
          sqlQuery(QUERIES.storeStock("PRODS_CHIN"))
        ]);

        if (cancelled) return;

        if (!descs && !bodega && !allInv) {
          setApiStatus("offline");
          setLoading(false);
          return;
        }

        setApiStatus("connected");

        // Build lookup maps
        var descMap = {};
        if (descs) descs.forEach(function(r) { descMap[r.Articulo] = r; });

        var bodegaMap = {};
        if (bodega) bodega.forEach(function(r) { bodegaMap[r.Articulo] = r; });

        var invMap = {};
        if (allInv) allInv.forEach(function(r) { invMap[r.Articulo] = r.Stock; });

        var storeMap = { leona:{}, cercu:{}, lecum:{}, chinco:{} };
        if (leonaS) leonaS.forEach(function(r) { storeMap.leona[r.Articulo] = r.Stock; });
        if (cercuS) cercuS.forEach(function(r) { storeMap.cercu[r.Articulo] = r.Stock; });
        if (lecumS) lecumS.forEach(function(r) { storeMap.lecum[r.Articulo] = r.Stock; });
        if (chincoS) chincoS.forEach(function(r) { storeMap.chinco[r.Articulo] = r.Stock; });

        // Merge into product list - use all unique article codes
        var allCodes = new Set();
        Object.keys(descMap).forEach(function(k) { allCodes.add(k); });
        Object.keys(bodegaMap).forEach(function(k) { allCodes.add(k); });
        Object.keys(invMap).forEach(function(k) { allCodes.add(k); });

        var prods = [];
        allCodes.forEach(function(code) {
          var d = descMap[code] || {};
          var b = bodegaMap[code] || {};
          var totalStock = invMap[code] || 0;
          var bodegaStock = b.Bodega_Stock || 0;
          var cost = b.Costo || 0;
          var price = d.Precio_Venta || 0;

          if (totalStock <= 0 && !d.Descripcion) return; // skip empty

          prods.push({
            style: code,
            name: d.Descripcion || code,
            category: d.Linea || "General",
            price: price,
            wholesale: cost,
            stock: totalStock,
            bodega: bodegaStock,
            leona: storeMap.leona[code] || 0,
            cercu: storeMap.cercu[code] || 0,
            lecum: storeMap.lecum[code] || 0,
            chinco: storeMap.chinco[code] || 0,
            reserved: 0
          });
        });

        // Sort by stock descending
        prods.sort(function(a, b) { return b.stock - a.stock; });

        if (!cancelled) {
          setProducts(prods);
          setLoading(false);
        }
      } catch(e) {
        console.error("Data load error:", e);
        if (!cancelled) { setApiStatus("offline"); setLoading(false); }
      }
    }
    load();

    // Check GDrive periodically
    var gdCheck = setInterval(function() {
      if (GDRIVE_LOADED && !imgReady) setImgReady(true);
    }, 1000);

    return function() { cancelled = true; clearInterval(gdCheck); };
  }, []);

  // Register refresh callback for GDrive
  useEffect(function() {
    window.__refreshApp = function() { setImgReady(true); };
    return function() { window.__refreshApp = null; };
  }, []);

  return { products, loading, apiStatus, imgReady };
}

// ====== PRODUCT IMAGE COMPONENT ======
function ProductImg({ style, size, className }) {
  const [src, setSrc] = useState(null);
  const [err, setErr] = useState(false);

  useEffect(function() {
    var url = getStyleImg(style);
    if (url) {
      setSrc(size === "large" ? url.replace("=w400", "=w800") : url);
      setErr(false);
    } else {
      setSrc(null);
    }
  }, [style, size]);

  if (src && !err) {
    return <img src={src} alt={style} onError={function() { setErr(true); }} style={{width:"100%",height:"100%",objectFit:size==="large"?"contain":"cover"}} />;
  }
  return <span className="pi-ph">{style || "?"}</span>;
}

function PinLogin({onLogin}){
const[user,setUser]=useState(USERS[0].name);const[pin,setPin]=useState("");const[error,setError]=useState("");
const hit=d=>{if(pin.length>=4)return;const np=pin+d;setPin(np);setError("");if(np.length===4){const u=USERS.find(u2=>u2.name===user);if(u&&u.pin===np)setTimeout(()=>onLogin(u),200);else setTimeout(()=>{setError("PIN incorrecto");setPin("")},300)}};
return(<div className="lw"><div className="lb">
<div className="ll">SAHIBA</div><div className="ls">Chain Store CRM</div>
<div className="lu">Usuario: <select value={user} onChange={e=>{setUser(e.target.value);setPin("");setError("")}}>{USERS.map(u=><option key={u.name} value={u.name}>{u.name} ({u.role})</option>)}</select></div>
<div className="pd">{[0,1,2,3].map(i=><div key={i} className={"pdd"+(i<pin.length?(error?" e":" f"):"")}/>)}</div>
<div className="pp">{[1,2,3,4,5,6,7,8,9].map(d=><button key={d} className="ppb" onClick={()=>hit(String(d))}>{d}</button>)}
<button className="ppb c" onClick={()=>{setPin("");setError("")}}>CLR</button>
<button className="ppb" onClick={()=>hit("0")}>0</button>
<button className="ppb c" onClick={()=>setPin(pin.slice(0,-1))}>DEL</button></div>
<div className="le">{error}</div>
</div></div>);
}

// ====== LIVE PRODUCT CATALOG ======
function ProductCatalog({products,loading,apiStatus,nav,lang}){
const t=T[lang];const[search,setSearch]=useState("");const[cat,setCat]=useState("all");const[page2,setPage2]=useState(1);
const perPage=40;
const cats=useMemo(()=>[...new Set(products.map(p=>p.category).filter(Boolean))].sort(),[products]);
const filtered=useMemo(()=>products.filter(p=>{
const ms=!search||p.name.toLowerCase().includes(search.toLowerCase())||p.style.toLowerCase().includes(search.toLowerCase());
const mc=cat==="all"||p.category===cat;return ms&&mc;
}),[products,search,cat]);
const totalPages=Math.ceil(filtered.length/perPage);
const pageItems=filtered.slice((page2-1)*perPage,page2*perPage);

if(loading)return <div className="ld-wrap"><div className="ld-spin"></div><div className="ld-text">{t.loadingData}</div></div>;

return(<div>
<div className="fb">
<input className="tb-s" placeholder={t.search} value={search} onChange={e=>{setSearch(e.target.value);setPage2(1)}} style={{width:220}}/>
<select className="fs" value={cat} onChange={e=>{setCat(e.target.value);setPage2(1)}}><option value="all">{t.allCategories}</option>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select>
<div className="api-status"><div className={"api-dot "+(apiStatus==="connected"?"on":apiStatus==="loading"?"loading":"off")}></div>{apiStatus==="connected"?t.apiConnected:t.apiOffline}</div>
<span style={{fontSize:11,color:"var(--t4)",marginLeft:"auto"}}>{filtered.length} {t.liveProducts}</span>
</div>
<div className="pg">{pageItems.map(p=><div key={p.style} className="pkd" onClick={()=>nav("product-detail",p)}>
<div className="pi"><ProductImg style={p.style}/><div className="sb-k"><span className={"bd "+(p.stock>500?"bd-gn":p.stock>100?"bd-yw":"bd-rd")}>{p.stock>500?t.inStock:p.stock>100?t.low:t.critical}</span></div></div>
<div className="pif"><div className="sn">#{p.style}</div><div className="pn">{p.name}</div>
<div className="pp2">{p.wholesale>0?fmt(p.wholesale):""} {p.price>0?<span style={{fontSize:10,color:"var(--t4)",fontWeight:400}}> / {fmt(p.price)} venta</span>:""}</div>
<div className="pcat">{p.category} - Stock: {(p.stock||0).toLocaleString()}</div></div>
</div>)}</div>
{totalPages>1&&<div style={{display:"flex",justifyContent:"center",gap:6,marginTop:18}}>
{Array.from({length:Math.min(totalPages,10)},(_,i)=>i+1).map(pg=><button key={pg} className={"btn btn-s "+(pg===page2?"btn-p":"btn-g")} onClick={()=>setPage2(pg)}>{pg}</button>)}
{totalPages>10&&<span style={{fontSize:11,color:"var(--t4)",padding:"6px"}}>...{totalPages}</span>}
</div>}
</div>);
}

// ====== QUOTE BUILDER ======
function QuoteBuilder({products, user, lang, editQuote, onSave, onClose}) {
  var [chain, setChain] = useState(editQuote ? editQuote.chain : CHAINS[0].name);
  var [search, setSearch] = useState("");
  var [items, setItems] = useState(editQuote ? editQuote.items.map(function(it){return Object.assign({},it)}) : []);
  var [discount, setDiscount] = useState(editQuote ? editQuote.discount || 0 : 0);
  var [notes, setNotes] = useState(editQuote ? editQuote.notes || "" : "");
  var [validDays, setValidDays] = useState(30);

  var chainObj = CHAINS.find(function(c){return c.name===chain}) || CHAINS[0];

  var searchResults = !search ? [] : products.filter(function(p) {
    return p.style.toLowerCase().indexOf(search.toLowerCase()) >= 0 || p.name.toLowerCase().indexOf(search.toLowerCase()) >= 0;
  }).slice(0, 15);

  function addItem(p) {
    if (items.find(function(it){return it.style===p.style})) return;
    setItems(function(prev){return prev.concat([{style:p.style, name:p.name, qty:100, unitPrice:p.wholesale || p.price || 0, barcode:""}])});
    setSearch("");
  }

  function updateItem(idx, field, value) {
    setItems(function(prev){return prev.map(function(it,i){if(i!==idx)return it;var n=Object.assign({},it);n[field]=field==="qty"||field==="unitPrice"?Number(value)||0:value;return n})});
  }

  function removeItem(idx) {
    setItems(function(prev){return prev.filter(function(_,i){return i!==idx})});
  }

  var subtotal = items.reduce(function(s,it){return s + it.qty * it.unitPrice}, 0);
  var total = subtotal - (discount || 0);

  function save() {
    if (items.length === 0) { alert("Agrega al menos un producto"); return; }
    var validDate = new Date();
    validDate.setDate(validDate.getDate() + validDays);
    var q = editQuote ? Object.assign({}, editQuote) : {};
    q.id = q.id || "QT-" + String(QUOTE_SEQ).padStart(3,"0");
    if (!editQuote) QUOTE_SEQ++;
    q.chain = chain;
    q.buyer = chainObj.buyer;
    q.items = items;
    q.subtotal = subtotal;
    q.discount = discount;
    q.total = total;
    q.status = q.status || "draft";
    q.salesperson = q.salesperson || user.name;
    q.date = q.date || new Date().toISOString().slice(0,10);
    q.validUntil = validDate.toISOString().slice(0,10);
    q.notes = notes;
    q.history = (q.history || []).concat([{date:new Date().toISOString().slice(0,10), action:editQuote?"edited":"created", user:user.name, detail:editQuote?"Cotizacion editada":"Cotizacion creada"}]);

// ====== ORDERS PIPELINE ======
function OrdersPipeline({user, nav, lang, products}) {
  var t = T[lang];
  var [orders, setOrders] = useState(ORDERS_DB);
  var ords = user.role === "admin" ? orders : user.role === "warehouse" ? orders.filter(function(o){return ["approved","in_production","ready_to_ship","delivered"].indexOf(o.stage) >= 0}) : orders.filter(function(o){return o.salesperson === user.name});

  function moveStage(ordId, newStage) {
    setOrders(function(prev) { return prev.map(function(o) {
      if (o.id !== ordId) return o;
      var h = (o.history || []).concat([{date:new Date().toISOString().slice(0,10), action:newStage, user:user.name, detail:"Stage -> " + stageLabel(newStage, lang)}]);
      var reserved = o.reserved;
      if (newStage === "approved") reserved = true;
      if (newStage === "delivered") reserved = false;
      return Object.assign({}, o, {stage: newStage, history: h, reserved: reserved});
    })});
    ORDERS_DB = orders;
  }

  return (<div>
    <div className="fb"><button className="btn btn-p">{t.newOrder}</button><span style={{fontSize:12,color:"var(--t4)"}}>{ords.length} {t.orders.toLowerCase()}</span></div>
    <div className="pl">{STAGES.map(function(stage) {
      var so = ords.filter(function(o){return o.stage === stage.key});
      return (<div key={stage.key} className="pl-c">
        <div className="pl-h"><h3 style={{color:stage.color}}>{stageLabel(stage.key,lang)}</h3><span className="pl-cnt">{so.length}</span></div>
        <div className="pl-b">{so.map(function(o) {
          var pctShipped = o.items.reduce(function(s,it){return s+it.qty},0) > 0 ? Math.round(o.items.reduce(function(s,it){return s+(it.shipped||0)},0) / o.items.reduce(function(s,it){return s+it.qty},0) * 100) : 0;
          return <div key={o.id} className="pl-k" onClick={function(){nav("order-detail-full",o)}}>
            <div className="kc">{o.chain} {o.quoteId ? "("+o.quoteId+")" : ""}</div>
            <div className="kt">{o.id}</div>
            <div className="km"><span className="ka">{fmt(o.total)}</span><span className="kd">{fmtD(o.date)}</span></div>
            <div className="kp">{o.salesperson}</div>
            {o.reserved && <span className="bd bd-yw" style={{fontSize:8,marginTop:4}}>RESERVADO</span>}
            {pctShipped > 0 && pctShipped < 100 && <div style={{marginTop:4,height:3,background:"var(--bdr)",borderRadius:2}}><div style={{height:3,background:"var(--cy)",borderRadius:2,width:pctShipped+"%"}}></div></div>}
          </div>;
        })}
        {so.length===0 && <div style={{padding:16,textAlign:"center",fontSize:11,color:"var(--t4)"}}>{t.noOrders}</div>}
        </div>
      </div>);
    })}</div>
  </div>);
}

  var [sf, setSf] = useState("all");

      <table className="li-table"><thead><tr><th>Estilo</th><th>Desc.</th><th style={{textAlign:"right"}}>Pedido</th><th style={{textAlign:"right"}}>Enviado</th><th style={{textAlign:"right"}}>Entregado</th></tr></thead><tbody>
      {order.items.map(function(it,i) {

          <td style={{textAlign:"right"}}>{it.qty}</td>

          <td style={{textAlign:"right"}}><span style={{color:(it.delivered||0)>=it.qty?"var(--gn)":"var(--t3)"}}>{it.delivered||0}</span></td>
        </tr>;
      })}
      </tbody></table>
      <div style={{marginTop:8}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--t3)",marginBottom:2}}>
          <span>Enviado: {totalShipped}/{totalQty}</span>
          <span>Entregado: {totalDelivered}/{totalQty}</span>
        </div>
        <div style={{height:6,background:"var(--bg)",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:6,borderRadius:3,background:totalDelivered>=totalQty?"var(--gn)":totalShipped>0?"var(--cy)":"var(--bdr)",width:Math.round(totalDelivered/Math.max(totalQty,1)*100)+"%",transition:"width .3s"}}></div>
        </div>
      </div>
    </div>

    {order.notes && <div className="dps"><h3>Notas</h3><p style={{fontSize:12,color:"var(--t2)"}}>{order.notes}</p></div>}

    <div className="dps"><h3>Historial ({(order.history||[]).length})</h3>
      <div className="st-timeline">{(order.history||[]).map(function(h,i) {
        var dotColor = h.action==="approved"||h.action==="delivered"||h.action==="paid"?"var(--gn)":h.action==="dispatched"?"var(--cy)":h.action==="rejected"?"var(--rd)":"var(--ac)";
        return <div key={i} className="st-item"><div className="st-dot" style={{background:dotColor}}></div><span className="st-time">{h.date}</span><span className="st-text"><strong>{h.user}</strong> - {h.detail}</span></div>;
      })}</div>
    </div>
  </div></div>);
}

<h2>{t.uploadFile}</h2>
<div className="fg"><label>{t.uploadType}</label><select className="fi"><option>{t.meetingNotes}</option><option>{t.reqFiles}</option><option>{t.signedOrders}</option><option>{t.deliveryProof}</option><option>{t.storePhotos}</option></select></div>
<div className="fg"><label>{t.chain}</label><select className="fi">{CHAINS.map(c=><option key={c.id}>{c.name}</option>)}</select></div>
<div className="fg"><label>File</label><input className="fi" type="file"/></div>
<div style={{display:"flex",gap:8,marginTop:16}}><button className="btn btn-p" onClick={()=>setShowUp(false)}>{t.save}</button><button className="btn btn-g" onClick={()=>setShowUp(false)}>{t.cancel}</button></div>
</div></div>}</div>);
}

function NotifsModule({lang}){const t=T[lang];const[tab,setTab]=useState("all");const filtered=tab==="all"?NOTIFS:NOTIFS.filter(n=>n.status===tab);
return(<div><div className="tabs"><div className={"tab"+(tab==="all"?" a":"")} onClick={()=>setTab("all")}>All</div><div className={"tab"+(tab==="pending"?" a":"")} onClick={()=>setTab("pending")}>{t.pending}</div><div className={"tab"+(tab==="scheduled"?" a":"")} onClick={()=>setTab("scheduled")}>{t.schedNotifs}</div><div className={"tab"+(tab==="sent"?" a":"")} onClick={()=>setTab("sent")}>{t.sentNotifs}</div></div>
<div className="tw"><table className="dt"><thead><tr><th>{t.channel}</th><th>{t.type}</th><th>{t.message}</th><th>{t.rep}</th><th>{t.scheduledFor}</th><th>{t.status}</th></tr></thead><tbody>
{filtered.map(n=><tr key={n.id}><td><span className={"bd "+(n.channel==="whatsapp"?"bd-gn":"bd-bl")}>{n.channel}</span></td><td style={{fontSize:11}}>{n.type}</td><td style={{fontSize:11,maxWidth:220}}>{n.message}</td><td>{n.recipient}</td><td style={{fontSize:11}}>{n.scheduledFor}</td><td><span className={"bd "+(n.status==="sent"?"bd-gn":n.status==="pending"?"bd-yw":"bd-bl")}>{n.status}</span></td></tr>)}
</tbody></table></div></div>);
}

function ReportsModule({lang,products}){const t=T[lang];const[tab,setTab]=useState("overview");const totalRev=ORDERS_DB.reduce((s,o)=>s+o.total,0);const avgOV=Math.round(totalRev/ORDERS_DB.length);
const months=["Ene","Feb","Mar","Abr"];const monthVals=[180000,255000,336000,510000];const maxVal=Math.max(...monthVals);
return(<div><div className="tabs"><div className={"tab"+(tab==="overview"?" a":"")} onClick={()=>setTab("overview")}>{t.overview}</div><div className={"tab"+(tab==="chain"?" a":"")} onClick={()=>setTab("chain")}>{t.byChain}</div><div className={"tab"+(tab==="rep"?" a":"")} onClick={()=>setTab("rep")}>{t.byRep}</div></div>
{tab==="overview"&&<div><div className="mg"><div className="mk"><div className="mk-l">{t.totalRevenue}</div><div className="mk-v" style={{color:"var(--gn)"}}>{fmt(totalRev)}</div></div><div className="mk"><div className="mk-l">{t.avgOrderValue}</div><div className="mk-v">{fmt(avgOV)}</div></div><div className="mk"><div className="mk-l">{t.liveProducts}</div><div className="mk-v">{products.length}</div></div><div className="mk"><div className="mk-l">{t.conversionRate}</div><div className="mk-v" style={{color:"var(--ac)"}}>{Math.round(ORDERS_DB.filter(o=>["paid","delivered"].includes(o.stage)).length/ORDERS_DB.length*100)}%</div></div></div>
<h3 style={{fontSize:13,marginBottom:10,color:"var(--t2)"}}>{t.monthlySales}</h3>
<div className="chart-ph"><div className="bar-chart">{months.map((m,i)=><div key={m} className="bar" style={{height:Math.round(monthVals[i]/maxVal*140)+"px",background:i===3?"var(--ac)":"var(--bdr2)",width:50}}><span className="bar-val">{fmt(monthVals[i])}</span><span className="bar-label">{m}</span></div>)}</div></div></div>}
{tab==="chain"&&<div className="tw"><table className="dt"><thead><tr><th>{t.chain}</th><th>{t.orders}</th><th>{t.total}</th><th>{t.delivered}</th><th>{t.paid}</th></tr></thead><tbody>
{CHAINS.map(c=>{const co=ORDERS_DB.filter(o=>o.chain===c.name);const rev=co.reduce((s,o)=>s+o.total,0);return <tr key={c.id}><td style={{fontWeight:600}}>{c.name}</td><td>{co.length}</td><td style={{color:"var(--gn)"}}>{fmt(rev)}</td><td>{co.filter(o=>o.stage==="delivered").length}</td><td>{co.filter(o=>o.stage==="paid").length}</td></tr>})}
</tbody></table></div>}
{tab==="rep"&&<div className="tw"><table className="dt"><thead><tr><th>{t.rep}</th><th>{t.orders}</th><th>{t.total}</th></tr></thead><tbody>
{["Ingrid","Cynthia","Sonia"].map(nm=>{const ords=ORDERS_DB.filter(o=>o.salesperson===nm);const rev=ords.reduce((s,o)=>s+o.total,0);return <tr key={nm}><td style={{fontWeight:600}}>{nm}</td><td>{ords.length}</td><td style={{color:"var(--gn)"}}>{fmt(rev)}</td></tr>})}
</tbody></table></div>}
</div>);
}

function SettingsModule({lang}){const t=T[lang];const[tab,setTab]=useState("general");
return(<div><div className="tabs"><div className={"tab"+(tab==="general"?" a":"")} onClick={()=>setTab("general")}>{t.generalSettings}</div><div className={"tab"+(tab==="users"?" a":"")} onClick={()=>setTab("users")}>{t.userMgmt}</div><div className={"tab"+(tab==="templates"?" a":"")} onClick={()=>setTab("templates")}>{t.chainTemplates}</div><div className={"tab"+(tab==="pricing"?" a":"")} onClick={()=>setTab("pricing")}>{t.pricingControl}</div><div className={"tab"+(tab==="audit"?" a":"")} onClick={()=>setTab("audit")}>{t.auditLog}</div></div>
{tab==="general"&&<div>
<div className="set-card"><h3>API / Data Connections</h3>
<div className="set-row"><span className="sr-l">SQL Server (ngrok)</span><span className="bd bd-gn">Connected</span></div>
<div className="set-row"><span className="sr-l">Google Drive Images</span><span className={"bd "+(GDRIVE_LOADED?"bd-gn":"bd-yw")}>{GDRIVE_LOADED?"Connected":"Loading..."}</span></div>
<div className="set-row"><span className="sr-l">Netlify Proxy</span><span className="bd bd-gn">Configured</span></div></div>
<div className="set-card"><h3>{t.notifSettings}</h3>
<div className="set-row"><span className="sr-l">{t.whatsapp}</span><div className="toggle on" onClick={e=>e.currentTarget.classList.toggle("on")}></div></div>
<div className="set-row"><span className="sr-l">{t.email}</span><div className="toggle on" onClick={e=>e.currentTarget.classList.toggle("on")}></div></div></div></div>}
{tab==="users"&&<div className="tw"><table className="dt"><thead><tr><th>{t.name}</th><th>Role</th><th>{t.status}</th><th>{t.action}</th></tr></thead><tbody>
{USERS.map(u=><tr key={u.name}><td style={{fontWeight:600}}>{u.name}</td><td><span className={"bd "+(u.role==="admin"?"bd-pk":u.role==="salesperson"?"bd-bl":"bd-or")}>{u.role}</span></td><td><span className="bd bd-gn">{t.active}</span></td><td><button className="btn btn-s btn-g">Edit</button></td></tr>)}
</tbody></table></div>}
{tab==="templates"&&<div>{CHAINS.map(c=><div key={c.id} className="set-card"><h3>{c.name}</h3>
<div className="set-row"><span className="sr-l">Ficha Tecnica</span><span className="bd bd-gn">Uploaded</span></div>
<div className="set-row"><span className="sr-l">Packing List</span><span className="bd bd-yw">{t.pending}</span></div>
<div className="set-row"><span className="sr-l">{t.deliveryRules}</span><span style={{fontSize:11,color:"var(--t2)",maxWidth:250,textAlign:"right"}}>{c.deliveryRules}</span></div></div>)}</div>}
{tab==="pricing"&&<div><div className="set-card"><h3>{t.pricingControl}</h3><p style={{fontSize:12,color:"var(--t3)",marginBottom:8}}>Only admin can modify pricing</p></div></div>}
{tab==="audit"&&<div className="tw" style={{padding:16}}>{AUDIT_LOG.map((log,i)=><div key={i} className="log-item"><span className="log-time">{log.time}</span><span className="log-user">{log.user}</span><span className="log-action">{log.action} - {log.detail}</span></div>)}</div>}
</div>);
}

// ====== MAIN APP ======
function App(){
const[user,setUser]=useState(null);const[page,setPage]=useState("dashboard");const[lang,setLang]=useState("es");const[sbOpen,setSbOpen]=useState(false);
const[detailType,setDetailType]=useState(null);const[detailData,setDetailData]=useState(null);
const{products,loading,apiStatus,imgReady}=useProducts();

const nav=useCallback((target,data)=>{
if(target==="order-detail"){setDetailType("order");setDetailData(data)}
else if(target==="order-detail-full"){setDetailType("order-full");setDetailData(data)}
else if(target==="account-detail"){setDetailType("account");setDetailData(data)}
else if(target==="product-detail"){setDetailType("product");setDetailData(data)}
else{setPage(target);setSbOpen(false)}
},[]);

const t=T[lang];if(!user)return <PinLogin onLogin={setUser}/>;
const isAdmin=user.role==="admin",isWh=user.role==="warehouse";

const navSections=isWh?[
{section:t.main,items:[{key:"dashboard",icon:"\u{1F4CA}",label:t.dashboard}]},
{section:t.operations,items:[{key:"orders",icon:"\u{1F4E6}",label:t.orders},{key:"inventory",icon:"\u{1F4E5}",label:t.inventory},{key:"delivery",icon:"\u{1F69A}",label:t.delivery}]}
]:isAdmin?[
{section:t.main,items:[{key:"dashboard",icon:"\u{1F4CA}",label:t.dashboard}]},
{section:t.sales,items:[{key:"accounts",icon:"\u{1F3EA}",label:t.accounts},{key:"catalog",icon:"\u{1F457}",label:t.catalog},{key:"pipeline",icon:"\u{1F4CB}",label:t.pipeline},{key:"orders",icon:"\u{1F4E6}",label:t.orders},{key:"quotes",icon:"\u{1F4B0}",label:t.quotes},{key:"tech_docs",icon:"\u{1F4C4}",label:t.techDocs},{key:"samples",icon:"\u{1F381}",label:t.samples}]},
{section:t.operations,items:[{key:"inventory",icon:"\u{1F4E5}",label:t.inventory},{key:"delivery",icon:"\u{1F69A}",label:t.delivery},{key:"invoices",icon:"\u{1F9FE}",label:t.invoices}]},
{section:t.system,items:[{key:"docs_media",icon:"\u{1F4CE}",label:t.docs},{key:"notifs",icon:"\u{1F514}",label:t.notifs,badge:NOTIFS.filter(n=>n.status==="pending").length},{key:"reports",icon:"\u{1F4C8}",label:t.reports},{key:"settings",icon:"\u2699\uFE0F",label:t.settings}]}
]:[
{section:t.main,items:[{key:"dashboard",icon:"\u{1F4CA}",label:t.myDashboard}]},
{section:t.sales,items:[{key:"accounts",icon:"\u{1F3EA}",label:t.myAccounts},{key:"catalog",icon:"\u{1F457}",label:t.catalog},{key:"pipeline",icon:"\u{1F4CB}",label:t.pipeline},{key:"orders",icon:"\u{1F4E6}",label:t.myOrders},{key:"quotes",icon:"\u{1F4B0}",label:t.quotes},{key:"tech_docs",icon:"\u{1F4C4}",label:t.techDocs},{key:"samples",icon:"\u{1F381}",label:t.samples}]},
{section:t.operations,items:[{key:"delivery",icon:"\u{1F69A}",label:t.delivery},{key:"docs_media",icon:"\u{1F4CE}",label:t.docs}]}
];
const pageTitle={dashboard:isAdmin?t.dashboard:isWh?t.dashboard:t.myDashboard,accounts:t.accounts,catalog:t.catalog,pipeline:t.pipeline,orders:t.orders,quotes:t.quotes,tech_docs:t.techDocs,samples:t.samples,inventory:t.inventory,delivery:t.delivery,invoices:t.invoices,docs_media:t.docs,notifs:t.notifs,reports:t.reports,settings:t.settings};

return(<div className="al">
{sbOpen&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:99}} onClick={()=>setSbOpen(false)}/>}
<aside className={"sb"+(sbOpen?" open":"")}>
<div className="sb-h"><h1>SAHIBA</h1><p>Chain Store CRM</p></div>
<nav className="sb-n">{navSections.map(sec=><div key={sec.section} className="ns"><div className="nl">{sec.section}</div>
{sec.items.map(item=><div key={item.key} className={"ni"+(page===item.key?" a":"")} onClick={()=>nav(item.key)}><span className="ic">{item.icon}</span>{item.label}{item.badge>0&&<span className="nb">{item.badge}</span>}</div>)}</div>)}</nav>
<div className="sb-f">
<div className="api-status" style={{marginBottom:8,paddingLeft:8}}><div className={"api-dot "+(apiStatus==="connected"?"on":apiStatus==="loading"?"loading":"off")}></div><span style={{fontSize:10}}>{apiStatus==="connected"?"SQL Live":"API "+apiStatus}</span>
{GDRIVE_LOADED&&<><div className="api-dot on" style={{marginLeft:8}}></div><span style={{fontSize:10}}>IMG</span></>}</div>
<div className="up" onClick={()=>{setUser(null);setPage("dashboard")}}><div className="ua">{user.initials}</div><div className="ui"><div className="un">{user.name}</div><div className="ur">{user.role}</div></div><span style={{fontSize:11,color:"var(--t4)",marginLeft:"auto"}}>{t.logout}</span></div>
</div></aside>

<div className="mc"><div className="tb"><div style={{display:"flex",alignItems:"center",gap:10}}><button className="hb" onClick={()=>setSbOpen(!sbOpen)}>{"\u2630"}</button><span className="tb-t">{pageTitle[page]||page}</span></div>
<div className="tb-a"><select className="lang-sw" value={lang} onChange={e=>setLang(e.target.value)}><option value="es">ES</option><option value="en">EN</option></select></div></div>
<div className="pc">
{page==="dashboard"&&(isWh?<WarehouseDash nav={nav} lang={lang}/>:isAdmin?<AdminDash nav={nav} lang={lang} products={products}/>:<SalesDash user={user} nav={nav} lang={lang}/>)}
{page==="accounts"&&<AccountsCRM user={user} nav={nav} lang={lang}/>}
{page==="catalog"&&<ProductCatalog products={products} loading={loading} apiStatus={apiStatus} nav={nav} lang={lang}/>}
{page==="pipeline"&&<OrdersPipeline user={user} nav={nav} lang={lang} products={products}/>}
{page==="orders"&&<OrdersList user={user} nav={nav} lang={lang} products={products}/>}
{page==="quotes"&&<QuotesModule user={user} lang={lang} products={products}/>}
{page==="tech_docs"&&<TechDocs lang={lang} products={products}/>}
{page==="samples"&&<SamplesTracking user={user} lang={lang}/>}
{page==="inventory"&&<InventoryModule products={products} loading={loading} nav={nav} lang={lang}/>}
{page==="delivery"&&<DeliveryModule lang={lang}/>}
{page==="invoices"&&<InvoicesModule lang={lang}/>}
{page==="docs_media"&&<DocsMedia user={user} lang={lang}/>}
{page==="notifs"&&<NotifsModule lang={lang}/>}
{page==="reports"&&<ReportsModule lang={lang} products={products}/>}
{page==="settings"&&<SettingsModule lang={lang}/>}
</div></div>
{detailData&&detailType!=="order-full"&&<DetailPanel type={detailType} data={detailData} onClose={()=>{setDetailType(null);setDetailData(null)}} lang={lang}/>}
{detailData&&detailType==="order-full"&&<OrderDetailFull order={detailData} onClose={()=>{setDetailType(null);setDetailData(null)}} user={user} lang={lang} products={products}/>}
</div>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
